<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Sports Planning Assistant information flow diagram</title>
  <desc id="desc">Diagram showing how the Streamlit app sends a user goal into a sequential CrewAI pipeline, how the data agent calls sports API tools, how all agents share the ChatOpenAI model, and how the final analysis is rendered back in the UI.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#e6eff4"/>
    </linearGradient>
    <linearGradient id="crewHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f4c5c"/>
      <stop offset="100%" stop-color="#1f7a8c"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef6fb"/>
    </linearGradient>
    <linearGradient id="taskCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f4ec"/>
    </linearGradient>
    <linearGradient id="depCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#edf8f1"/>
    </linearGradient>
    <linearGradient id="outputCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef9ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#13313a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#34515e"/>
    </marker>
    <marker id="dottedArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4a6670"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #13313a; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #48616a; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #17343d; letter-spacing: 0.8px; }
      .card-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #17343d; }
      .card-subtitle { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #56737d; text-transform: uppercase; letter-spacing: 1px; }
      .body { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #2f4952; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #5a737d; }
      .arrow-label { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #49636d; }
      .pill { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #0f4c5c; }
      .task-num { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f4c5c; }
      .code { font: 600 13px Consolas, 'Courier New', monospace; fill: #28424b; }
      .dotted { stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect width="1800" height="1120" fill="url(#bg)"/>

  <text x="70" y="72" class="title">Sports Planning Assistant: Information Flow</text>
  <text x="70" y="102" class="subtitle">Entry point: Streamlit UI -> CrewAI sequential process -> tool-backed sports lookup -> final markdown analysis</text>

  <text x="70" y="160" class="section">USER / UI</text>
  <g filter="url(#shadow)">
    <rect x="70" y="190" width="280" height="140" rx="24" fill="url(#blueCard)" stroke="#bed8e5" stroke-width="2"/>
    <text x="102" y="236" class="card-subtitle">INPUT</text>
    <text x="102" y="268" class="card-title">User Goal</text>
    <text x="102" y="298" class="body">Free-text request such as</text>
    <text x="102" y="322" class="body">"Show IPL match statistics"</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="390" width="280" height="255" rx="24" fill="url(#blueCard)" stroke="#bed8e5" stroke-width="2"/>
    <text x="102" y="436" class="card-subtitle">APP LAYER</text>
    <text x="102" y="468" class="card-title">Streamlit App</text>
    <text x="102" y="498" class="code">app.py</text>
    <text x="102" y="534" class="body">- st.text_input(goal)</text>
    <text x="102" y="560" class="body">- Generate Plan button</text>
    <text x="102" y="586" class="body">- spinner / error handling</text>
    <text x="102" y="612" class="body">- crew.kickoff(inputs={"goal": goal})</text>
  </g>

  <text x="390" y="160" class="section">CREW ORCHESTRATION</text>
  <g filter="url(#shadow)">
    <rect x="390" y="190" width="1020" height="640" rx="30" fill="#ffffff" stroke="#9db6c2" stroke-width="2.5"/>
    <rect x="390" y="190" width="1020" height="88" rx="30" fill="url(#crewHeader)"/>
    <path d="M390 248 Q390 278 420 278 L1380 278 Q1410 278 1410 248" fill="url(#crewHeader)"/>
    <text x="430" y="240" style="font:700 24px 'Segoe UI', Arial, sans-serif; fill:#ffffff;">CrewAI Runtime</text>
    <text x="430" y="266" style="font:400 14px 'Segoe UI', Arial, sans-serif; fill:#d9eef3;">crew_setup.py | process="sequential" | tracing=True</text>

    <rect x="432" y="310" width="220" height="360" rx="24" fill="url(#taskCard)" stroke="#dccfb8" stroke-width="2"/>
    <circle cx="482" cy="362" r="28" fill="#dff1f5"/>
    <text x="471" y="371" class="task-num">1</text>
    <text x="462" y="418" class="card-subtitle">TASK</text>
    <text x="462" y="448" class="card-title">Goal Analysis</text>
    <text x="462" y="476" class="code">goal_analysis_task</text>
    <text x="462" y="518" class="card-subtitle">AGENT</text>
    <text x="462" y="546" class="body">Sports Goal Analyzer</text>
    <text x="462" y="584" class="small">Extracts sport, league,</text>
    <text x="462" y="606" class="small">teams or players,</text>
    <text x="462" y="628" class="small">and requested stats.</text>

    <rect x="680" y="310" width="220" height="360" rx="24" fill="url(#taskCard)" stroke="#dccfb8" stroke-width="2"/>
    <circle cx="730" cy="362" r="28" fill="#dff1f5"/>
    <text x="719" y="371" class="task-num">2</text>
    <text x="710" y="418" class="card-subtitle">TASK</text>
    <text x="710" y="448" class="card-title">Planning</text>
    <text x="710" y="476" class="code">planning_task</text>
    <text x="710" y="518" class="card-subtitle">AGENT</text>
    <text x="710" y="546" class="body">Sports Planning Agent</text>
    <text x="710" y="584" class="small">Builds the execution plan</text>
    <text x="710" y="606" class="small">for verification, retrieval,</text>
    <text x="710" y="628" class="small">analysis, and insights.</text>

    <rect x="928" y="310" width="220" height="360" rx="24" fill="url(#taskCard)" stroke="#dccfb8" stroke-width="2"/>
    <circle cx="978" cy="362" r="28" fill="#dff1f5"/>
    <text x="967" y="371" class="task-num">3</text>
    <text x="958" y="418" class="card-subtitle">TASK</text>
    <text x="958" y="448" class="card-title">Data Retrieval</text>
    <text x="958" y="476" class="code">data_task</text>
    <text x="958" y="518" class="card-subtitle">AGENT</text>
    <text x="958" y="546" class="body">Sports Data Retrieval</text>
    <text x="958" y="568" class="body">Agent</text>
    <text x="958" y="606" class="small">Chooses fetch_team_data()</text>
    <text x="958" y="628" class="small">or fetch_league_data()</text>
    <text x="958" y="650" class="small">via ReAct-style reasoning.</text>

    <rect x="1176" y="310" width="220" height="360" rx="24" fill="url(#taskCard)" stroke="#dccfb8" stroke-width="2"/>
    <circle cx="1226" cy="362" r="28" fill="#dff1f5"/>
    <text x="1215" y="371" class="task-num">4</text>
    <text x="1206" y="418" class="card-subtitle">TASK</text>
    <text x="1206" y="448" class="card-title">Analysis</text>
    <text x="1206" y="476" class="code">analysis_task</text>
    <text x="1206" y="518" class="card-subtitle">AGENT</text>
    <text x="1206" y="546" class="body">Sports Data Analyst</text>
    <text x="1206" y="584" class="small">Turns tool output into</text>
    <text x="1206" y="606" class="small">markdown insights, stats,</text>
    <text x="1206" y="628" class="small">and summary sections.</text>

    <rect x="730" y="715" width="340" height="80" rx="18" fill="#eef6fb" stroke="#b7d4df" stroke-width="2"/>
    <text x="760" y="748" class="card-subtitle">SHARED RUNTIME INPUT</text>
    <text x="760" y="778" class="body">The original {goal} moves through the full sequential chain.</text>
  </g>

  <text x="1470" y="160" class="section">DEPENDENCIES / EXTERNAL DATA</text>
  <g filter="url(#shadow)">
    <rect x="1470" y="190" width="260" height="180" rx="24" fill="url(#depCard)" stroke="#b9d9c2" stroke-width="2"/>
    <text x="1500" y="232" class="card-subtitle">LLM CONFIG</text>
    <text x="1500" y="264" class="card-title">Shared ChatOpenAI</text>
    <text x="1500" y="292" class="code">config.py -> get_llm()</text>
    <text x="1500" y="328" class="body">model="gpt-4o-mini"</text>
    <text x="1500" y="352" class="body">Used by all 4 agents</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1470" y="410" width="260" height="145" rx="24" fill="url(#depCard)" stroke="#b9d9c2" stroke-width="2"/>
    <text x="1500" y="452" class="card-subtitle">ENVIRONMENT</text>
    <text x="1500" y="484" class="card-title">.env</text>
    <text x="1500" y="518" class="body">OPENAI_API_KEY</text>
    <text x="1500" y="542" class="body">SPORTS_API base URL</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1470" y="595" width="260" height="200" rx="24" fill="url(#depCard)" stroke="#b9d9c2" stroke-width="2"/>
    <text x="1500" y="637" class="card-subtitle">TOOL + API LAYER</text>
    <text x="1500" y="669" class="card-title">stats_tool.py / sports_api.py</text>
    <text x="1500" y="705" class="body">fetch_team_data(team_name)</text>
    <text x="1500" y="729" class="body">fetch_league_data(league_name)</text>
    <text x="1500" y="753" class="body">requests.get(...)</text>
    <text x="1500" y="777" class="body">Returns JSON or league match</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1470" y="835" width="260" height="150" rx="24" fill="url(#depCard)" stroke="#b9d9c2" stroke-width="2"/>
    <text x="1500" y="877" class="card-subtitle">EXTERNAL SERVICE</text>
    <text x="1500" y="909" class="card-title">Sports API Endpoint</text>
    <text x="1500" y="943" class="body">searchteams.php</text>
    <text x="1500" y="967" class="body">search_all_leagues.php</text>
  </g>

  <text x="530" y="905" class="section">FINAL OUTPUT</text>
  <g filter="url(#shadow)">
    <rect x="500" y="930" width="640" height="130" rx="24" fill="url(#outputCard)" stroke="#bad8bc" stroke-width="2"/>
    <text x="535" y="972" class="card-subtitle">STREAMLIT RENDER</text>
    <text x="535" y="1004" class="card-title">Markdown Sports Analysis</text>
    <text x="535" y="1038" class="body">result.raw -> st.markdown(final_output)</text>
  </g>

  <line x1="210" y1="330" x2="210" y2="390" stroke="#34515e" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="224" y="366" class="arrow-label">goal text</text>

  <path d="M350 520 C385 520 385 490 430 490" fill="none" stroke="#34515e" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="362" y="485" class="arrow-label">crew.kickoff(inputs={"goal": goal})</text>

  <line x1="652" y1="490" x2="680" y2="490" stroke="#34515e" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="608" y="464" class="arrow-label">structured goal details</text>

  <line x1="900" y1="490" x2="928" y2="490" stroke="#34515e" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="842" y="464" class="arrow-label">execution plan</text>

  <line x1="1148" y1="490" x2="1176" y2="490" stroke="#34515e" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1088" y="464" class="arrow-label">tool results</text>

  <path d="M1286 670 C1286 808 1050 808 1050 930" fill="none" stroke="#34515e" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1160" y="844" class="arrow-label">final insights / result.raw</text>

  <path d="M1148 620 C1320 620 1320 695 1470 695" fill="none" stroke="#34515e" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1240" y="598" class="arrow-label">tool invocation</text>

  <path d="M1410 330 C1442 330 1442 280 1470 280" fill="none" stroke="#4a6670" stroke-width="3" class="dotted" marker-end="url(#dottedArrow)"/>
  <text x="1342" y="254" class="arrow-label">all agents share llm</text>

  <line x1="1600" y1="555" x2="1600" y2="595" stroke="#4a6670" stroke-width="3" class="dotted" marker-end="url(#dottedArrow)"/>
  <text x="1614" y="582" class="arrow-label">base URL</text>

  <path d="M1600 410 C1600 386 1600 386 1600 370" fill="none" stroke="#4a6670" stroke-width="3" class="dotted" marker-end="url(#dottedArrow)"/>
  <text x="1614" y="395" class="arrow-label">api key</text>

  <line x1="1600" y1="795" x2="1600" y2="835" stroke="#34515e" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1614" y="822" class="arrow-label">HTTP requests</text>

  <path d="M820 1060 C620 1060 430 1060 250 1060 C185 1060 170 1008 170 985" fill="none" stroke="#4a6670" stroke-width="3" class="dotted" marker-end="url(#dottedArrow)"/>
  <text x="326" y="1088" class="arrow-label">user reads results in the UI</text>

  <rect x="71" y="881" width="278" height="74" rx="18" fill="#ffffff" opacity="0.9" stroke="#d6e4ea" stroke-width="1.5"/>
  <text x="98" y="913" class="pill">Legend</text>
  <text x="98" y="939" class="small">Solid arrows = data/control flow</text>
  <text x="98" y="959" class="small">Dotted arrows = shared config/dependency wiring</text>
</svg>
