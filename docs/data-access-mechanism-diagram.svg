<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1240" viewBox="0 0 1800 1240" role="img" aria-labelledby="title desc">
  <title id="title">Sports Planning Assistant data access mechanism diagram</title>
  <desc id="desc">Diagram showing how sports data is accessed in the Sports Planning Assistant through the CrewAI data agent, tool wrappers, HTTP adapter, environment configuration, external API endpoints, and returned JSON data.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f2e9"/>
      <stop offset="100%" stop-color="#e8f0f5"/>
    </linearGradient>
    <linearGradient id="laneBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef7fb"/>
      <stop offset="100%" stop-color="#e4eef5"/>
    </linearGradient>
    <linearGradient id="laneSand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf5ea"/>
      <stop offset="100%" stop-color="#f3ead9"/>
    </linearGradient>
    <linearGradient id="laneMint" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef8f1"/>
      <stop offset="100%" stop-color="#e2f0e7"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#edf7fb"/>
    </linearGradient>
    <linearGradient id="cardSand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbf3e6"/>
    </linearGradient>
    <linearGradient id="cardMint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef8f0"/>
    </linearGradient>
    <linearGradient id="cardRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8edf0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18343d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#36505c"/>
    </marker>
    <marker id="softArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6a8189"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #17343d; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #556c75; }
      .lane { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #17343d; letter-spacing: 0.8px; }
      .card-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #17343d; }
      .card-subtitle { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #5b737d; text-transform: uppercase; letter-spacing: 1px; }
      .body { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #304953; }
      .small { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #607981; }
      .code { font: 600 13px Consolas, 'Courier New', monospace; fill: #29434c; }
      .label { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #4c6570; }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect width="1800" height="1240" fill="url(#bg)"/>

  <text x="70" y="74" class="title">Sports Planning Assistant: Data Access Mechanism</text>
  <text x="70" y="104" class="subtitle">How the application chooses a data path, loads configuration, performs HTTP lookups, parses responses, and returns sports data to the analysis flow</text>

  <g filter="url(#shadow)">
    <rect x="60" y="150" width="420" height="980" rx="30" fill="url(#laneBlue)" stroke="#bad4e0" stroke-width="2"/>
    <rect x="520" y="150" width="610" height="980" rx="30" fill="url(#laneSand)" stroke="#d4c7ad" stroke-width="2"/>
    <rect x="1170" y="150" width="570" height="980" rx="30" fill="url(#laneMint)" stroke="#bfd7c5" stroke-width="2"/>
  </g>

  <text x="90" y="198" class="lane">REQUESTING LAYER</text>
  <text x="550" y="198" class="lane">DATA ACCESS LAYER</text>
  <text x="1200" y="198" class="lane">CONFIGURATION + EXTERNAL SOURCE</text>

  <g filter="url(#shadow)">
    <rect x="95" y="240" width="350" height="160" rx="24" fill="url(#cardBlue)" stroke="#b5d2df" stroke-width="2"/>
    <text x="126" y="282" class="card-subtitle">ENTRY</text>
    <text x="126" y="314" class="card-title">User Goal</text>
    <text x="126" y="350" class="body">A natural-language request such as</text>
    <text x="126" y="372" class="body">"Show IPL match statistics".</text>

    <rect x="95" y="450" width="350" height="190" rx="24" fill="url(#cardBlue)" stroke="#b5d2df" stroke-width="2"/>
    <text x="126" y="492" class="card-subtitle">ORCHESTRATION CALLER</text>
    <text x="126" y="524" class="card-title">Crew Runtime</text>
    <text x="126" y="552" class="code">app.py -> crew.kickoff(...)</text>
    <text x="126" y="588" class="body">The sequential crew runs task stages until</text>
    <text x="126" y="610" class="body">the data retrieval step needs sports data.</text>

    <rect x="95" y="690" width="350" height="210" rx="24" fill="url(#cardBlue)" stroke="#b5d2df" stroke-width="2"/>
    <text x="126" y="732" class="card-subtitle">REQUEST PRODUCER</text>
    <text x="126" y="764" class="card-title">Sports Data Retrieval Agent</text>
    <text x="126" y="792" class="code">agents.py</text>
    <text x="126" y="828" class="body">Uses ReAct-style reasoning to decide:</text>
    <text x="126" y="852" class="small">- fetch team data</text>
    <text x="126" y="874" class="small">- fetch league data</text>
    <text x="126" y="896" class="small">- or continue with missing-data context</text>

    <rect x="95" y="950" width="350" height="130" rx="24" fill="url(#cardRose)" stroke="#d9bbc3" stroke-width="2"/>
    <text x="126" y="992" class="card-subtitle">DOWNSTREAM CONSUMER</text>
    <text x="126" y="1024" class="card-title">Analysis Task</text>
    <text x="126" y="1060" class="body">Consumes returned sports data and turns it</text>
    <text x="126" y="1082" class="body">into the final markdown report.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="555" y="240" width="540" height="150" rx="24" fill="url(#cardSand)" stroke="#d1c2a6" stroke-width="2"/>
    <text x="588" y="282" class="card-subtitle">TOOL FACADE</text>
    <text x="588" y="314" class="card-title">CrewAI Tool Wrappers</text>
    <text x="588" y="342" class="code">tools/stats_tool.py</text>
    <text x="588" y="378" class="body">Exposes `fetch_team_data(team_name)` and</text>
    <text x="588" y="400" class="body">`fetch_league_data(league_name)` as CrewAI tools.</text>

    <rect x="555" y="440" width="540" height="210" rx="24" fill="url(#cardSand)" stroke="#d1c2a6" stroke-width="2"/>
    <text x="588" y="482" class="card-subtitle">ROUTING LOGIC</text>
    <text x="588" y="514" class="card-title">Access Strategy</text>
    <text x="588" y="550" class="small">Team path:</text>
    <text x="588" y="572" class="code">fetch_team_data() -> search_team()</text>
    <text x="588" y="610" class="small">League path:</text>
    <text x="588" y="632" class="code">fetch_league_data() -> search_league()</text>

    <rect x="555" y="700" width="540" height="185" rx="24" fill="url(#cardSand)" stroke="#d1c2a6" stroke-width="2"/>
    <text x="588" y="742" class="card-subtitle">HTTP ADAPTER</text>
    <text x="588" y="774" class="card-title">Sports API Client</text>
    <text x="588" y="802" class="code">tools/sports_api.py</text>
    <text x="588" y="838" class="body">Encapsulates low-level HTTP calls with</text>
    <text x="588" y="860" class="code">requests.get(url, params=...)</text>

    <rect x="555" y="935" width="540" height="145" rx="24" fill="url(#cardSand)" stroke="#d1c2a6" stroke-width="2"/>
    <text x="588" y="977" class="card-subtitle">RETURN SHAPE</text>
    <text x="588" y="1009" class="card-title">Tool Output</text>
    <text x="588" y="1045" class="body">Returns `str(data)` to the CrewAI runtime,</text>
    <text x="588" y="1067" class="body">which is then used by the analyst agent.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1205" y="240" width="500" height="180" rx="24" fill="url(#cardMint)" stroke="#b8d3bf" stroke-width="2"/>
    <text x="1238" y="282" class="card-subtitle">SETTINGS SOURCE</text>
    <text x="1238" y="314" class="card-title">Environment Variables</text>
    <text x="1238" y="342" class="code">.env</text>
    <text x="1238" y="378" class="body">`SPORTS_API` is loaded with `load_dotenv()`</text>
    <text x="1238" y="400" class="body">and used as the base URL for lookups.</text>

    <rect x="1205" y="470" width="500" height="185" rx="24" fill="url(#cardMint)" stroke="#b8d3bf" stroke-width="2"/>
    <text x="1238" y="512" class="card-subtitle">REMOTE ENDPOINTS</text>
    <text x="1238" y="544" class="card-title">Sports API Endpoints</text>
    <text x="1238" y="580" class="small">Team search:</text>
    <text x="1238" y="602" class="code">/searchteams.php?t={team_name}</text>
    <text x="1238" y="640" class="small">League search:</text>
    <text x="1238" y="662" class="code">/search_all_leagues.php</text>

    <rect x="1205" y="705" width="500" height="195" rx="24" fill="url(#cardMint)" stroke="#b8d3bf" stroke-width="2"/>
    <text x="1238" y="747" class="card-subtitle">RESPONSE MODEL</text>
    <text x="1238" y="779" class="card-title">JSON Payload Handling</text>
    <text x="1238" y="815" class="body">`search_team()` returns full JSON when</text>
    <text x="1238" y="837" class="body">HTTP status is 200, otherwise `None`.</text>
    <text x="1238" y="875" class="body">`search_league()` scans `leagues` and returns</text>
    <text x="1238" y="897" class="body">the first matching league record.</text>

    <rect x="1205" y="950" width="500" height="130" rx="24" fill="url(#cardRose)" stroke="#d9bbc3" stroke-width="2"/>
    <text x="1238" y="992" class="card-subtitle">FAILURE / GAPS</text>
    <text x="1238" y="1024" class="card-title">Missing or Failed Data</text>
    <text x="1238" y="1060" class="body">If status is not 200 or no league matches,</text>
    <text x="1238" y="1082" class="body">the access layer yields `None`-like results.</text>
  </g>

  <line x1="445" y1="562" x2="555" y2="315" stroke="#36505c" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="456" y="526" class="label">tool invocation request</text>

  <line x1="445" y1="792" x2="555" y2="315" stroke="#36505c" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="455" y="750" class="label">selected access path</text>

  <line x1="825" y1="390" x2="825" y2="440" stroke="#36505c" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="840" y="420" class="label">choose team vs league</text>

  <line x1="825" y1="650" x2="825" y2="700" stroke="#36505c" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="840" y="680" class="label">delegate HTTP</text>

  <line x1="825" y1="885" x2="825" y2="935" stroke="#36505c" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="840" y="915" class="label">normalize for CrewAI</text>

  <path d="M1095 792 C1145 792 1145 562 1205 562" fill="none" stroke="#36505c" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1120" y="768" class="label">HTTP request</text>

  <path d="M1205 355 C1135 355 1135 792 1095 792" fill="none" stroke="#6a8189" stroke-width="3" class="dash" marker-end="url(#softArrow)"/>
  <text x="1110" y="334" class="label">base URL configuration</text>

  <path d="M1455 655 C1455 680 1455 680 1455 705" fill="none" stroke="#36505c" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1468" y="684" class="label">response body</text>

  <path d="M1455 900 C1455 925 1455 925 1455 950" fill="none" stroke="#6a8189" stroke-width="3" class="dash" marker-end="url(#softArrow)"/>
  <text x="1468" y="928" class="label">non-200 or no match</text>

  <path d="M1205 802 C1145 802 1145 1010 1095 1010" fill="none" stroke="#36505c" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="1122" y="986" class="label">parsed data</text>

  <path d="M555 1010 C495 1010 495 1015 445 1015" fill="none" stroke="#36505c" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="464" y="988" class="label">returned data string</text>

  <path d="M445 1015 C520 1015 520 1015 95 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M1205 1015 C1100 1015 1100 1015 1095 1015" fill="none" stroke="#6a8189" stroke-width="3" class="dash" marker-end="url(#softArrow)"/>
  <text x="1108" y="1040" class="label">missing-data case</text>

  <path d="M555 1010 C500 1010 500 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C500 1010 500 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C510 1010 510 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C500 1010 500 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C490 1010 490 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C485 1010 485 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C510 1010 510 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C470 1010 470 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C500 1010 500 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C500 1010 500 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C490 1010 490 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C460 1010 460 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C500 1010 500 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M445 1015 C400 1015 400 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M445 1015 C410 1015 410 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M445 1015 C470 1015 470 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C500 1010 500 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M445 1015 C360 1015 360 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C495 1010 495 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M445 1015 C445 1015 445 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C500 1010 500 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C510 1010 510 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C485 1010 485 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M555 1010 C470 1010 470 1015 445 1015" fill="none" stroke="#36505c" stroke-width="0"/>

  <path d="M1095 1010 C995 1010 995 1015 445 1015" fill="none" stroke="#36505c" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="734" y="1040" class="label">analysis consumes retrieved data</text>

  <rect x="70" y="1160" width="790" height="52" rx="14" fill="#ffffff" opacity="0.92" stroke="#d8e3e8" stroke-width="1.5"/>
  <text x="95" y="1192" class="small">Solid arrows = data request / response path. Dashed arrows = configuration wiring and failure-state propagation.</text>
</svg>
